body: |-
  The authored registry is entity-centric JSON.
  The graph export is derived and consists of nodes and typed edges.
  
  Representative edge types:
  - `SCOPES`
  - `USES_BOUNDARY`
  - `ASSERTS`
  - `VERIFIES`
  - `SUPPORTS`
  - `DERIVES_FROM`
  - `AFFECTS`
  - `PUBLISHES`
  - `INCLUDES`
